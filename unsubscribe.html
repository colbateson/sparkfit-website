<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe | SparkFit</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; color: #333; }
        .loader { color: #7B3FAD; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">
        <p class="loader">Processing your request...</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const emailToUnsubscribe = urlParams.get('email');
        const statusDiv = document.getElementById('status');

        if (emailToUnsubscribe) {
            const payload = {
                auth_key: "sf_prod_7a2b9e14c3f8d0a6x2j9k5mQvR4tW8zP",
                email: emailToUnsubscribe,
                subscribed: false, 
                source: "unsubscribe_page"
            };

            fetch("https://script.google.com/macros/s/AKfycbxl_8XzJkNufEwAJ4WZWb2_Jejl4mkPDCpNPmH-Vu0WOFTplC2T5B3ZbCN74Iw97UM/exec", {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                statusDiv.innerHTML = "<h1>You have been unsubscribed.</h1><p>We are sorry to see you go!</p>";
            }).catch(err => {
                statusDiv.innerHTML = "<h1>Something went wrong.</h1><p>Please try again later or contact support.</p>";
            });
        } else {
            statusDiv.innerHTML = "<h1>Invalid Link</h1><p>No email address was provided.</p>";
        }
    </script>
</body>
</html>
