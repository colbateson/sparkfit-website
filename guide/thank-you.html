<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Ready | SparkFit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
    document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', 'YOUR_PIXEL_ID_HERE'); 
    fbq('track', 'PageView');
    fbq('track', 'Lead'); 
    </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 text-center border border-gray-100">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="check" class="w-8 h-8 text-green-600"></i>
        </div>
        <h1 class="text-2xl font-black mb-2">Check Your Email!</h1>
        <p class="text-gray-600 mb-8 text-sm">We've sent the guide to your inbox, but you can also download it right now below.</p>

        <a href="SparkFit Fitness Guide.pdf" download class="block w-full bg-[#7B3FAD] hover:bg-purple-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center space-x-2 mb-8">
            <i data-lucide="download" class="w-5 h-5"></i>
            <span>Download Guide PDF</span>
        </a>

        <div class="pt-6 border-t border-gray-100">
            <p class="text-xs text-gray-500 mb-4 uppercase font-bold tracking-widest">Want to automate the results?</p>
            <a href="https://apps.apple.com/gb/app/spark-fit-15-minute-workouts/id6754826325">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" class="h-10 mx-auto" alt="App Store">
            </a>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
